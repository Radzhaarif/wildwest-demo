<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Map Module Prototype</title>
    <link rel="icon" href="data:," />
    <link id="mainStylesheet" rel="stylesheet" data-versioned-href="./src/styles.css" />
  </head>
  <body>
    <div id="gameOrientationRoot" class="game-orientation-root">
    <section id="loadingOverlay" class="loading-overlay" aria-live="polite" aria-busy="true">
      <div class="loading-logo-stage" aria-hidden="true">
        <img id="loadingLogo" class="loading-logo" alt="" />
        <span id="loadingWave" class="loading-wave"></span>
      </div>
      <div class="loading-panel">
        <h2 id="loadingTitle">Loading</h2>
        <p id="loadingStatus" class="loading-status">Preparing game</p>
        <div class="loading-progress" aria-hidden="true">
          <span id="loadingProgressBar"></span>
        </div>
        <p id="loadingProgressText" class="loading-progress-text">0%</p>
      </div>
    </section>

    <!-- Главное меню локализуется и управляется из src/map-module.js через id. -->
    <section id="mainMenu" class="main-menu">
      <div class="main-menu-frame">
        <div class="main-menu-panel">
          <div class="menu-content">
            <p class="eyebrow">Roguelike match-3</p>
            <h1 id="mainMenuTitle">Wild West</h1>
            <div id="mainMenuActions" class="menu-actions">
              <button id="startGameButton" type="button">START</button>
              <button id="settingsButton" type="button">Settings</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Карта и игровые overlay живут в одном shell: JS скрывает меню и показывает этот слой после START. -->
    <main class="app-shell">
      <div id="mapUiFrame" class="map-ui-frame">
        <div id="mapUiPanel" class="map-ui-panel">
          <header class="map-actions">
            <button id="surrenderButton" type="button">Surrender</button>
            <button id="mapSettingsButton" type="button">Settings</button>
            <button id="eventLogButton" type="button">Log</button>
          </header>

          <section class="status-row" aria-live="polite">
            <span id="campaignStatus">Campaign loading</span>
            <span id="selectionStatus">No node selected</span>
          </section>

          <!-- HUD полностью строится из runtime playerState и data/settings/items.jsonc при старте игры. -->
          <section id="mapHud" class="map-hud" aria-label="Player status"></section>
        </div>
      </div>

      <!-- mapBoard очищается и полностью перерисовывается при каждом render(). -->
      <section class="map-stage">
        <div class="map-viewport" aria-label="Generated map">
          <div id="mapBoard" class="map-board">
            <div id="mapEffects" class="map-effects" aria-hidden="true"></div>
          </div>
        </div>
      </section>

      <!-- Диалоговая точка карты: затемняет/размывает карту, показывает персонажа и варианты ответа. -->
      <section id="mapDialogOverlay" class="map-dialog-overlay hidden" aria-label="Dialog">
        <div class="map-ui-overlay-frame">
          <div class="map-ui-overlay-panel">
            <div class="map-dialog-scene">
              <img id="mapDialogCharacter" class="map-dialog-character" alt="" />
              <div class="map-dialog-box">
                <p id="mapDialogText"></p>
                <div id="mapDialogAnswers" class="map-dialog-answers"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Магазин использует payload выбранной точки shop из JSONC карты. -->
      <section id="shopOverlay" class="shop-overlay hidden" aria-label="Trader shop">
        <div class="map-ui-overlay-frame">
          <div class="map-ui-overlay-panel">
            <div class="shop-panel">
              <div class="shop-goods">
                <h2 id="shopTitle">Trader</h2>
                <div id="shopItems" class="shop-items"></div>
                <div id="shopConfirm" class="shop-confirm hidden">
                  <p id="shopConfirmText"></p>
                  <div>
                    <button id="shopConfirmNoButton" type="button">No</button>
                    <button id="shopConfirmYesButton" type="button">Yes</button>
                  </div>
                </div>
                <p id="shopErrorText" class="shop-error hidden"></p>
                <div class="shop-actions">
                  <button id="shopLeaveButton" type="button">Leave</button>
                  <button id="shopBuyButton" type="button">Buy</button>
                </div>
              </div>
              <div class="shop-trader">
                <img id="shopEventImage" alt="" />
                <p id="shopDialogText"></p>
              </div>
              <div class="shop-inventory">
                <h2 id="inventoryTitle">Inventory</h2>
                <div id="inventoryItems" class="inventory-items"></div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Лечение использует payload выбранной точки heal из JSONC карты. -->
      <section id="healOverlay" class="shop-overlay hidden" aria-label="Healing">
        <div class="map-ui-overlay-frame">
          <div class="map-ui-overlay-panel">
            <div class="heal-panel">
              <div class="heal-info">
                <h2 id="healTitle">Healing</h2>
                <div class="heal-card">
                  <img data-versioned-src="./data/Assets/icons/hearts.png" alt="" />
                  <strong id="healAmountText"></strong>
                  <span id="healCurrentHpText"></span>
                </div>
                <div class="heal-actions">
                  <button id="healApplyButton" type="button"></button>
                  <button id="healLeaveButton" type="button"></button>
                </div>
                <p id="healErrorText" class="shop-error hidden"></p>
              </div>
              <div class="shop-trader">
                <img id="healEventImage" alt="" />
                <p id="healDialogText"></p>
              </div>
            </div>
          </div>
        </div>
      </section>

      <!-- Награда показывает замыленное eventImage и крупные иконки полученных предметов. -->
      <section id="rewardOverlay" class="reward-overlay hidden" aria-label="Reward">
        <div class="map-ui-overlay-frame">
          <div class="map-ui-overlay-panel">
            <div class="reward-window">
              <div id="rewardBackdrop" class="reward-backdrop"></div>
              <div id="rewardItems" class="reward-items"></div>
              <div class="reward-message">
                <p id="rewardDialogText"></p>
                <button id="rewardClaimButton" type="button"></button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!-- Один overlay настроек используется и в меню, и поверх карты. -->
    <section id="settingsOverlay" class="modal-overlay hidden">
      <div class="map-ui-overlay-frame">
        <div class="map-ui-overlay-panel">
          <div id="settingsPanel" class="settings-panel">
            <h2 id="settingsTitle">Settings</h2>
            <label>
              <span id="musicVolumeLabel">Music volume</span>
              <input id="musicVolumeInput" type="range" min="0" max="1" step="0.05" />
            </label>
            <label>
              <span id="soundVolumeLabel">Sound volume</span>
              <input id="soundVolumeInput" type="range" min="0" max="1" step="0.05" />
            </label>
            <label>
              <span id="settingsLanguageLabel">Language</span>
              <select id="settingsLanguageSelect">
                <option value="en">EN</option>
                <option value="ru">RU</option>
              </select>
            </label>
            <div class="settings-actions">
              <button id="resetSettingsButton" type="button">Reset</button>
              <button id="backSettingsButton" type="button">Back</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Лог событий перенесен из нижней панели в отдельный overlay. -->
    <section id="eventLogOverlay" class="modal-overlay hidden">
      <div class="map-ui-overlay-frame">
        <div class="map-ui-overlay-panel">
          <div class="event-log-modal">
            <h2 id="eventLogTitle">Event log</h2>
            <ol id="eventLog"></ol>
            <button id="eventLogBackButton" type="button">Back</button>
          </div>
        </div>
      </div>
    </section>

    <!-- Диалог сдачи возвращает в главное меню только по подтверждению. -->
    <section id="surrenderOverlay" class="modal-overlay hidden">
      <div class="map-ui-overlay-frame">
        <div class="map-ui-overlay-panel">
          <div class="surrender-modal">
            <p id="surrenderText"></p>
            <div>
              <button id="surrenderConfirmButton" type="button"></button>
              <button id="surrenderCancelButton" type="button"></button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Служебный dialog для простых сообщений вроде skip и victory. -->
    <dialog id="eventDialog" class="event-dialog">
      <div class="map-ui-overlay-frame">
        <div class="map-ui-overlay-panel">
          <form class="event-dialog-panel" method="dialog">
            <img id="eventDialogImage" alt="" hidden />
            <p id="eventDialogText"></p>
            <button type="submit">OK</button>
          </form>
        </div>
      </div>
    </dialog>
    </div>

    <script>
      const APP_VERSION_GLOBAL_KEY = "__ROGUELITE_MATCH3_VERSION__";
      const DEFAULT_APP_VERSION = "dev";
      const VERSION_MANIFEST_URL = "./version.json";
      const VERSIONED_CURSOR_URLS = [
        ["--cursor-default", "../data/Assets/cursor/ready/cursor.png", "4 2"],
        ["--cursor-active", "../data/Assets/cursor/ready/cursor_activ.png", "4 2"],
        ["--cursor-help", "../data/Assets/cursor/ready/cursor_q.png", "7 2"],
        ["--cursor-hand-finger", "../data/Assets/cursor/ready/hand-finger.png", "14 5"],
        ["--cursor-hand", "../data/Assets/cursor/ready/hand.png", "14 14"],
        ["--cursor-hand-take", "../data/Assets/cursor/ready/hand_take.png", "14 14"],
        ["--cursor-up-down", "../data/Assets/cursor/ready/up_down.png", "16 16"],
      ];
      const VERSIONED_MODULE_PATHS = [
        "./src/app-version.js",
        "./src/asset-preloader.js",
        "./src/audio-module.js",
        "./src/data-loader.js",
        "./src/data-validation.js",
        "./src/debug-hooks.js",
        "./src/map-module.js",
        "./src/rich-text.js",
        "./src/seeded-random.js",
        "./src/map/map-generation.js",
        "./src/battle/battle-animations.js",
        "./src/battle/battle-board-actions.js",
        "./src/battle/battle-board-view.js",
        "./src/battle/battle-config.js",
        "./src/battle/battle-contract.js",
        "./src/battle/battle-data.js",
        "./src/battle/battle-engine.js",
        "./src/battle/battle-feedback-view.js",
        "./src/battle/battle-formatters.js",
        "./src/battle/battle-inventory-view.js",
        "./src/battle/battle-module.js",
        "./src/battle/battle-outcome-flow.js",
        "./src/battle/battle-player-items.js",
        "./src/battle/battle-popovers.js",
        "./src/battle/battle-projectiles-view.js",
        "./src/battle/battle-rage-flow.js",
        "./src/battle/battle-resolution.js",
        "./src/battle/battle-runtime.js",
        "./src/battle/battle-scaffold-view.js",
        "./src/battle/battle-shuffle-flow.js",
        "./src/battle/battle-state.js",
        "./src/battle/battle-stats-view.js",
        "./src/battle/battle-trace.js",
        "./src/battle/battle-view.js",
      ];
      const bootstrapScript = document.currentScript;

      bootstrap().catch((error) => {
        console.error(error);
        const loadingTitle = document.getElementById("loadingTitle");
        const loadingStatus = document.getElementById("loadingStatus");
        if (loadingTitle) {
          loadingTitle.textContent = "Ошибка загрузки";
        }
        if (loadingStatus) {
          loadingStatus.textContent = error.message;
        }
      });

      async function bootstrap() {
        const version = await loadAppVersion();
        globalThis[APP_VERSION_GLOBAL_KEY] = version;
        applyCursorVersion(version);
        applyStaticAssetVersion(version);
        applyStylesheetVersion(version);
        installVersionedImportMap(version);
        await import(appendVersionParam("./src/map-module.js", version));
      }

      async function loadAppVersion() {
        try {
          const response = await fetch(VERSION_MANIFEST_URL, { cache: "no-store" });
          if (!response.ok) {
            throw new Error(`Failed to load ${VERSION_MANIFEST_URL} (${response.status})`);
          }
          const manifest = await response.json();
          return normalizeAppVersion(manifest?.version) || DEFAULT_APP_VERSION;
        } catch (error) {
          console.warn("Failed to load version manifest; using dev cache version.", error);
          return DEFAULT_APP_VERSION;
        }
      }

      function applyStylesheetVersion(version) {
        const stylesheet = document.getElementById("mainStylesheet");
        const href = stylesheet?.dataset?.versionedHref;
        if (stylesheet && href) {
          stylesheet.href = appendVersionParam(href, version);
        }
      }

      function applyCursorVersion(version) {
        for (const [property, url, hotspot] of VERSIONED_CURSOR_URLS) {
          document.documentElement.style.setProperty(property, `url("${appendVersionParam(url, version)}") ${hotspot}`);
        }
      }

      function applyStaticAssetVersion(version) {
        for (const element of document.querySelectorAll("[data-versioned-src]")) {
          element.src = appendVersionParam(element.dataset.versionedSrc, version);
        }
      }

      function installVersionedImportMap(version) {
        if (!HTMLScriptElement.supports || !HTMLScriptElement.supports("importmap")) {
          return;
        }

        const imports = {};
        for (const modulePath of VERSIONED_MODULE_PATHS) {
          imports[modulePath] = appendVersionParam(modulePath, version);
        }

        const importMap = document.createElement("script");
        importMap.type = "importmap";
        importMap.textContent = JSON.stringify({ imports });
        (bootstrapScript || document.head.lastElementChild).after(importMap);
      }

      function appendVersionParam(url, version) {
        const rawUrl = String(url || "");
        if (!rawUrl || /^(?:blob:|data:|https?:)/i.test(rawUrl)) {
          return rawUrl;
        }
        const normalizedVersion = normalizeAppVersion(version) || DEFAULT_APP_VERSION;
        const [pathWithoutHash, hash = ""] = rawUrl.split("#");
        const separator = pathWithoutHash.includes("?") ? "&" : "?";
        return `${pathWithoutHash}${separator}v=${encodeURIComponent(normalizedVersion)}${hash ? `#${hash}` : ""}`;
      }

      function normalizeAppVersion(value) {
        return typeof value === "string" ? value.trim() : "";
      }
    </script>
  </body>
</html>
